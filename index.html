<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>勇者大冒險</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-dark:  #1a1a2e;
      --bg-mid:   #16213e;
      --bg-panel: #0f3460;
      --accent:   #e94560;
      --gold:     #ffd700;
      --green:    #4caf50;
      --red:      #f44336;
      --text:     #eaeaea;
      --text-dim: #8888aa;
    }
    body {
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-x: hidden;
    }
    .screen {
      display: none;
      width: 100%;
      max-width: 520px;
      padding: 16px;
      min-height: 100vh;
      flex-direction: column;
      animation: fadeIn 0.3s ease;
    }
    .screen.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== 首頁 ===== */
    #screen-home {
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      overflow-y: auto;
      padding-top: 20px;
      padding-bottom: 24px;
    }
    .game-title {
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      text-align: center;
      line-height: 1.2;
    }
    .game-subtitle { color: var(--text-dim); font-size: 0.85rem; }
    .home-title-display {
      background: var(--bg-panel);
      border-radius: 10px;
      padding: 7px 16px;
      font-size: 0.85rem;
      width: 100%;
      text-align: center;
    }
    .home-title-display .label { color: var(--text-dim); font-size: 0.7rem; }
    .home-title-display .title-text { color: var(--gold); font-weight: 700; }
    .home-action-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .btn-treasury {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 10px;
      padding: 9px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-treasury:hover { background: rgba(255,215,0,0.1); }
    .btn-reset {
      background: none;
      border: 1px solid #444;
      color: var(--text-dim);
      border-radius: 10px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn-reset:hover { border-color: var(--red); color: var(--red); }

    .level-cards { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .level-card {
      background: var(--bg-mid);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .level-card.unlocked { border-color: var(--bg-panel); cursor: pointer; }
    .level-card.unlocked:hover { border-color: var(--gold); }
    .level-card.unlocked.advanced { border-color: rgba(76,175,80,0.4); }
    .level-card.locked { opacity: 0.4; cursor: not-allowed; }
    .level-card.boss-card { border-color: rgba(255,80,0,0.4); }
    .level-card.boss-card.unlocked { border-color: #ff4500; }
    .level-card .boss-icon { font-size: 2rem; width: 40px; text-align: center; flex-shrink: 0; }
    .level-card .level-info { flex: 1; min-width: 0; }
    .level-card .level-name { font-weight: 700; font-size: 0.88rem; }
    .level-card .level-progress { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }
    .level-card .level-status { font-size: 1.1rem; flex-shrink: 0; }
    .card-treasures { display: flex; gap: 2px; margin-top: 4px; flex-wrap: wrap; }
    .card-treasure { font-size: 0.85rem; }
    .card-treasure.empty { filter: grayscale(1) opacity(0.5); }
    .progress-bar-mini { height: 3px; background: #333; border-radius: 2px; margin-top: 4px; overflow: hidden; }
    .progress-bar-mini-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.5s; }

    /* ===== 戰鬥 ===== */
    #screen-battle { gap: 0; justify-content: flex-start; }
    .battle-stage {
      background: linear-gradient(180deg, #0d1b2a 0%, #1a1a2e 100%);
      border-radius: 16px;
      padding: 12px;
      position: relative;
      overflow: hidden;
      min-height: 200px;
    }
    .boss-title-bar {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      color: var(--red);
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(244,67,54,0.7);
      white-space: nowrap;
      pointer-events: none;
    }
    .boss-area {
      position: absolute;
      top: 12px; right: 16px;
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .boss-name { font-size: 0.8rem; color: var(--text-dim); }
    .boss-hp-bar-wrap { width: 120px; background: #333; height: 8px; border-radius: 4px; overflow: hidden; }
    .boss-hp-bar { height: 100%; background: var(--red); border-radius: 4px; transition: width 0.5s ease; }

    .boss-sprite {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      line-height: 1;
      cursor: default;
      user-select: none;
    }
    .bv-aura    { font-size: 1.2rem; letter-spacing: 6px; opacity: 0.85; }
    .bv-main    { display: block; line-height: 1; }
    .bv-weapons { font-size: 1.4rem; letter-spacing: 8px; margin-top: 2px; }
    .boss-sprite.level-1  .bv-main { font-size: 4.5rem; }
    .boss-sprite.level-2  .bv-main { font-size: 5rem; }
    .boss-sprite.level-3  .bv-main { font-size: 5.5rem; }
    .boss-sprite.level-4  .bv-main { font-size: 5.5rem; filter: drop-shadow(0 0 8px #0cf); }
    .boss-sprite.level-5  .bv-main { font-size: 6rem; filter: drop-shadow(0 0 8px #f90); }
    .boss-sprite.level-6  .bv-main { font-size: 6rem; filter: drop-shadow(0 0 8px #06f); }
    .boss-sprite.level-7  .bv-main { font-size: 6.5rem; filter: drop-shadow(0 0 10px #f60); }
    .boss-sprite.level-8  .bv-main { font-size: 6.5rem; filter: drop-shadow(0 0 10px #80f); }
    .boss-sprite.level-9  .bv-main { font-size: 7rem; filter: drop-shadow(0 0 12px #f60); }
    .boss-sprite.level-10 .bv-main { font-size: 7rem; filter: drop-shadow(0 0 14px #0ff); }
    .boss-sprite.level-boss .bv-main {
      font-size: 7.5rem;
      animation: finalBossGlow 1.2s ease-in-out infinite alternate;
    }
    @keyframes finalBossGlow {
      from { filter: drop-shadow(0 0 15px #f00) drop-shadow(0 0 25px #f60); }
      to   { filter: drop-shadow(0 0 30px #f00) drop-shadow(0 0 50px #ff0); }
    }

    .player-area {
      position: absolute;
      bottom: 12px; left: 16px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .player-sprite { font-size: 3.5rem; line-height: 1; display: inline-block; user-select: none; }
    .player-sprite.stage-2 { font-size: 4rem; filter: drop-shadow(0 0 6px #aaf); }
    .player-sprite.stage-3 { font-size: 4.5rem; animation: playerGlow 2s ease-in-out infinite alternate; }
    @keyframes playerGlow {
      from { filter: drop-shadow(0 0 8px gold); }
      to   { filter: drop-shadow(0 0 20px gold) drop-shadow(0 0 30px #f0f); }
    }
    .player-name { font-size: 0.72rem; color: var(--text-dim); }
    .hearts { font-size: 1.3rem; letter-spacing: 2px; }

    .battle-counters {
      position: absolute;
      bottom: 12px; right: 16px;
      text-align: right;
      font-size: 0.72rem;
      color: var(--text-dim);
      line-height: 1.7;
    }
    .battle-counters .win-count { color: var(--green); }
    .attack-target-text { color: var(--gold); font-weight: 700; }

    /* 問題區 */
    .question-area {
      background: var(--bg-mid);
      border: 1px solid var(--bg-panel);
      border-radius: 12px;
      padding: 14px;
      margin-top: 10px;
      text-align: center;
    }
    .question-progress { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 6px; }
    .question-prompt {
      font-size: 2.2rem;
      font-weight: 900;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
    }
    .question-emoji { font-size: 5rem; }
    .question-type-label { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; }

    .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .btn-answer {
      background: var(--bg-panel);
      border: 2px solid transparent;
      color: var(--text);
      border-radius: 10px;
      padding: 14px 10px;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      min-height: 64px;
      word-break: break-all;
    }
    .btn-answer:hover:not(:disabled) { border-color: var(--gold); }
    .btn-answer:active:not(:disabled) { transform: scale(0.96); }
    .btn-answer:disabled { cursor: not-allowed; }
    .btn-answer.correct { background: var(--green); border-color: #81c784; animation: correctPulse 0.4s ease-out; }
    .btn-answer.wrong   { background: var(--red);   border-color: #e57373; animation: wrongShake  0.4s ease-out; }
    @keyframes correctPulse { 0%{transform:scale(1)} 40%{transform:scale(1.06)} 100%{transform:scale(1)} }
    @keyframes wrongShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .btn-confirm-wrong {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: var(--gold);
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      animation: correctPulse 0.4s ease-out;
    }
    .btn-confirm-wrong:hover { filter: brightness(1.1); }

    /* ===== 刀光特效 ===== */
    #slash-effect {
      position: absolute;
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 30;
      font-size: 4rem;
      opacity: 0;
    }
    #slash-effect.slash-active { animation: slashAnim 0.55s ease-out forwards; }
    #slash-effect.slash-crit   { font-size: 5.5rem; animation: slashCritAnim 0.65s ease-out forwards; }
    @keyframes slashAnim {
      0%   { opacity:0; transform:translate(-50%,-50%) scale(0.2) rotate(-70deg); }
      30%  { opacity:1; transform:translate(-50%,-50%) scale(1.5) rotate(8deg); }
      65%  { opacity:.8; transform:translate(-50%,-50%) scale(1.2) rotate(-5deg); }
      100% { opacity:0; transform:translate(-50%,-50%) scale(0.5) rotate(30deg); }
    }
    @keyframes slashCritAnim {
      0%   { opacity:0; transform:translate(-50%,-50%) scale(0.1) rotate(-90deg); }
      20%  { opacity:1; transform:translate(-50%,-50%) scale(2.2) rotate(5deg); }
      50%  { opacity:1; transform:translate(-50%,-50%) scale(1.8) rotate(-8deg); }
      80%  { opacity:.6; transform:translate(-50%,-50%) scale(1.3) rotate(10deg); }
      100% { opacity:0; transform:translate(-50%,-50%) scale(0.4) rotate(50deg); }
    }

    /* ===== 浮動傷害 ===== */
    .float-dmg { position:absolute; font-weight:900; pointer-events:none; animation:floatUp 1.1s ease-out forwards; z-index:50; white-space:nowrap; }
    .float-dmg.normal { font-size:1.8rem; color:#fff; text-shadow:0 0 6px #f80,0 2px 4px #000; }
    .float-dmg.crit   { font-size:2.8rem; color:#ff6; text-shadow:0 0 12px #f60,0 2px 4px #000; }
    .float-dmg.crit::before { content:'暴擊! '; font-size:1rem; color:#f60; }
    @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 60%{opacity:1;transform:translateY(-50px) scale(1.1)} 100%{opacity:0;transform:translateY(-90px) scale(0.7)} }

    /* ===== Boss/Player 受傷 ===== */
    .boss-hit { animation: bossHit 0.4s ease-out; }
    @keyframes bossHit {
      0%,100%{transform:translateX(0);filter:none}
      20%{transform:translateX(-14px) rotate(-4deg);filter:brightness(3) saturate(0)}
      40%{transform:translateX(14px) rotate(4deg);filter:brightness(2)}
      60%{transform:translateX(-8px)} 80%{transform:translateX(8px)}
    }
    .player-hit { animation: playerHit 0.5s ease-out; }
    @keyframes playerHit {
      0%,100%{filter:none;transform:translateX(0)}
      20%,60%{filter:brightness(3) sepia(1) hue-rotate(-20deg);transform:translateX(-6px)}
      40%,80%{transform:translateX(6px)}
    }

    /* ===== 粒子 ===== */
    .particle { position:fixed; pointer-events:none; font-size:1.5rem; animation:particleFly 1.5s ease-out forwards; z-index:999; }
    @keyframes particleFly { 0%{opacity:1;transform:translate(0,0) rotate(0) scale(1)} 100%{opacity:0;transform:var(--fly-to) rotate(360deg) scale(0.3)} }

    /* ===== 結果覆蓋 ===== */
    #screen-result {
      position:fixed; inset:0; background:rgba(0,0,0,.85);
      align-items:center; justify-content:center; z-index:100;
      text-align:center; gap:16px;
    }
    .result-icon { font-size:5rem; }
    .result-title { font-size:1.8rem; font-weight:900; }
    .result-title.win { color:var(--gold); }
    .result-title.lose { color:var(--red); }
    .result-stats { color:var(--text-dim); font-size:.9rem; line-height:1.8; }
    .btn-primary {
      background:var(--accent); color:#fff; border:none; border-radius:12px;
      padding:14px 32px; font-size:1.1rem; font-weight:700; cursor:pointer;
      transition:transform .1s,box-shadow .1s;
      box-shadow:0 4px 15px rgba(233,69,96,.4);
    }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(233,69,96,.5); }

    /* ===== 升等頭銜 ===== */
    #screen-levelup {
      position:fixed; inset:0;
      background:radial-gradient(ellipse at center,#1a0a30 0%,#0a0a0a 100%);
      align-items:center; justify-content:center; z-index:200;
      text-align:center; gap:20px;
    }
    .levelup-stars { font-size:2rem; letter-spacing:8px; }
    .levelup-label { font-size:.85rem; color:var(--text-dim); letter-spacing:3px; text-transform:uppercase; }
    .levelup-title-card {
      background:linear-gradient(135deg,#2d1b69,#11093e);
      border:2px solid var(--gold);
      border-radius:20px;
      padding:22px 36px;
      box-shadow:0 0 40px rgba(255,215,0,.3);
      animation:titleReveal .8s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes titleReveal {
      0%{opacity:0;transform:scale(0.3) rotate(-15deg)}
      60%{transform:scale(1.05) rotate(2deg)}
      100%{opacity:1;transform:scale(1) rotate(0)}
    }
    .levelup-title-text { font-size:1.8rem; font-weight:900; color:var(--gold); text-shadow:0 0 20px rgba(255,215,0,.6); }
    .levelup-subtitle { font-size:.82rem; color:var(--text-dim); margin-top:4px; }
    .levelup-next-boss { font-size:4rem; margin-top:8px; }

    /* ===== 遊戲完成 ===== */
    #screen-gamecomplete {
      position:fixed; inset:0;
      background:radial-gradient(ellipse at center,#0d2818 0%,#0a0a0a 100%);
      align-items:center; justify-content:center; z-index:300;
      text-align:center; gap:14px;
    }
    .complete-trophy { font-size:6rem; animation:trophySpin 3s ease-in-out infinite; }
    @keyframes trophySpin { 0%,100%{transform:rotate(-5deg) scale(1)} 50%{transform:rotate(5deg) scale(1.05)} }
    .complete-title { font-size:2rem; font-weight:900; color:var(--gold); }
    .complete-subtitle { font-size:.95rem; color:#aaa; }
    .all-titles { display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; }
    .earned-title-item { background:var(--bg-panel); border-radius:8px; padding:6px 14px; font-size:.85rem; color:var(--gold); }

    /* ===== 寶物圖鑑 ===== */
    #screen-treasury {
      overflow-y: auto;
      gap: 0;
      padding-bottom: 40px;
    }
    .treasury-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0 12px;
      position: sticky;
      top: 0;
      background: var(--bg-dark);
      z-index: 10;
    }
    .treasury-header h2 { flex: 1; font-size: 1.1rem; color: var(--gold); }
    .collection-count { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; }
    .treasury-section { margin-bottom: 16px; }
    .treasury-level-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #222;
    }
    .tl-count { margin-left: auto; color: var(--gold); font-weight: 700; }
    .treasury-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .treasure-slot {
      background: var(--bg-mid);
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 8px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      min-height: 68px;
      transition: border-color 0.2s;
    }
    .treasure-slot.collected { border-color: rgba(255,215,0,0.35); background: rgba(255,215,0,0.05); }
    .treasure-slot.empty { opacity: 0.45; }
    .ts-emoji { font-size: 1.8rem; line-height: 1; }
    .ts-name { font-size: 0.58rem; color: var(--text-dim); text-align: center; line-height: 1.2; }
    .treasure-slot.collected .ts-name { color: var(--text); }

    /* 王冠區塊 */
    .crown-section {
      text-align: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #2a2a4a;
    }
    .crown-section-label {
      font-size: 0.82rem;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-bottom: 12px;
    }
    .crown-wrapper { display: flex; justify-content: center; }
    .crown-slot {
      width: 140px;
      height: 140px;
      background: var(--bg-mid);
      border: 2px solid #333;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      position: relative;
    }
    .crown-slot.collected {
      border: 3px solid var(--gold);
      background: linear-gradient(135deg, #1a0a30, #0f3460);
      animation: crownGlow 2s ease-in-out infinite alternate;
    }
    @keyframes crownGlow {
      from { box-shadow: 0 0 15px rgba(255,215,0,.3); }
      to   { box-shadow: 0 0 40px rgba(255,215,0,.7), 0 0 70px rgba(255,165,0,.3); }
    }
    .crown-slot.collected::before { content:'✨'; position:absolute; top:-10px; left:-10px; font-size:1.2rem; }
    .crown-slot.collected::after  { content:'✨'; position:absolute; bottom:-10px; right:-10px; font-size:1.2rem; }
    .crown-icon { font-size: 4rem; line-height: 1; }
    .crown-slot.collected .crown-icon { filter: drop-shadow(0 0 12px gold); animation: crownFloat 2s ease-in-out infinite alternate; }
    @keyframes crownFloat { from{transform:translateY(-2px)} to{transform:translateY(4px)} }
    .crown-name { font-size: 0.72rem; font-weight: 700; color: var(--text-dim); }
    .crown-slot.collected .crown-name { color: var(--gold); }

    /* ===== 共用返回按鈕 ===== */
    .btn-back {
      background: none;
      border: 1px solid #333;
      color: var(--text-dim);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-back:hover { border-color: var(--text-dim); color: var(--text); }

    @media (max-height: 700px) {
      .battle-stage { min-height: 160px; }
      .boss-sprite.level-boss .bv-main,
      .boss-sprite.level-10  .bv-main,
      .boss-sprite.level-9   .bv-main { font-size: 5.5rem !important; }
    }
  </style>
</head>
<body>

  <!-- ====== 首頁 ====== -->
  <div class="screen active" id="screen-home">
    <div class="game-title">⚔️ 英語勇者<br>大冒險</div>
    <div class="game-subtitle">打敗怪物，學好英文！</div>
    <div class="home-title-display">
      <div class="label">目前頭銜</div>
      <div class="title-text" id="home-title-text">——</div>
    </div>
    <div class="home-action-row">
      <button class="btn-treasury" id="btn-open-treasury">📖 寶物圖鑑</button>
      <button class="btn-reset"    id="btn-reset">重置</button>
    </div>
    <div class="level-cards" id="level-cards"></div>
  </div>

  <!-- ====== 戰鬥 ====== -->
  <div class="screen" id="screen-battle">
    <button class="btn-back" id="btn-back-home" style="align-self:flex-start; margin-bottom:6px">← 回首頁</button>
    <div class="battle-stage" id="battle-stage">
      <!-- 怪物名稱標題 -->
      <div class="boss-title-bar" id="boss-title-bar"></div>
      <!-- Boss -->
      <div class="boss-area">
        <div class="boss-name" id="boss-name" style="display:none"></div>
        <div class="boss-hp-bar-wrap">
          <div class="boss-hp-bar" id="boss-hp-bar" style="width:100%"></div>
        </div>
        <div class="boss-sprite" id="boss-sprite"></div>
      </div>
      <!-- 玩家 -->
      <div class="player-area">
        <div class="player-sprite" id="player-sprite">⚔️</div>
        <div class="player-name"   id="player-name">小劍士</div>
        <div class="hearts"        id="hearts">♥♥♥</div>
      </div>
      <!-- 刀光 -->
      <div id="slash-effect"></div>
    </div>
    <!-- 問題 -->
    <div class="question-area">
      <div class="question-progress" id="question-progress">第 1 / ? 題</div>
      <div class="question-prompt"   id="question-prompt">...</div>
      <div class="question-type-label" id="question-type-label"></div>
    </div>
    <div class="answer-grid" id="answer-grid">
      <button class="btn-answer" id="btn-ans-0"></button>
      <button class="btn-answer" id="btn-ans-1"></button>
      <button class="btn-answer" id="btn-ans-2"></button>
      <button class="btn-answer" id="btn-ans-3"></button>
    </div>
    <button class="btn-confirm-wrong" id="btn-confirm-wrong" style="display:none">我知道了 ✓</button>
  </div>

  <!-- ====== 結果 ====== -->
  <div class="screen" id="screen-result">
    <div class="result-icon"  id="result-icon">🎉</div>
    <div class="result-title" id="result-title">勝利！</div>
    <div class="result-stats" id="result-stats"></div>
    <button class="btn-primary" id="btn-result-continue">繼續</button>
  </div>

  <!-- ====== 升等 ====== -->
  <div class="screen" id="screen-levelup">
    <div class="levelup-stars">✨⭐✨</div>
    <div class="levelup-label">恭喜！獲得頭銜</div>
    <div class="levelup-title-card">
      <div class="levelup-title-text" id="levelup-title-text">見習劍士</div>
      <div class="levelup-subtitle"   id="levelup-subtitle">等級 1 完成</div>
    </div>
    <div class="levelup-next-boss" id="levelup-next-boss">🦊</div>
    <div id="levelup-next-label" style="font-size:.82rem; color:var(--text-dim)">下一個挑戰：狡猾狐</div>
    <button class="btn-primary" id="btn-levelup-continue">出發冒險！</button>
  </div>

  <!-- ====== 遊戲完成 ====== -->
  <div class="screen" id="screen-gamecomplete">
    <div class="complete-trophy">🏆</div>
    <div class="complete-title">究極英語王！</div>
    <div class="complete-subtitle">你打敗了究極魔獸，成為傳說！</div>
    <div class="all-titles" id="all-titles-list"></div>
    <button class="btn-primary" id="btn-play-again">再玩一次</button>
  </div>

  <!-- ====== 寶物圖鑑 ====== -->
  <div class="screen" id="screen-treasury">
    <div class="treasury-header">
      <button class="btn-back" id="btn-back-from-treasury">← 返回</button>
      <h2>📖 寶物圖鑑</h2>
      <div class="collection-count">已收集 <span id="total-collected">0</span>/<span id="total-max">81</span></div>
    </div>
    <div id="treasury-levels"></div>
    <!-- 王冠 -->
    <div class="crown-section">
      <div class="crown-section-label">⚔ 究極寶物 ⚔</div>
      <div class="crown-wrapper">
        <div class="crown-slot" id="crown-slot">
          <span class="crown-icon">❓</span>
          <span class="crown-name">???</span>
        </div>
      </div>
    </div>
  </div>

  <script src="words.js"></script>
  <script src="game.js"></script>
</body>
</html>
